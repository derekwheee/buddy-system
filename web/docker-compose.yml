services:
    web:
        build: .
        restart: unless-stopped
        # Internal only — never published to the host. The tunnel reaches it over the
        # shared compose network at http://web:80.
        expose:
            - '80'

    cloudflared:
        image: cloudflare/cloudflared:latest
        restart: unless-stopped
        command: tunnel run
        environment:
            # Provided via the gitignored .env file (see .env.example).
            - TUNNEL_TOKEN=${TUNNEL_TOKEN}
        depends_on:
            - web
